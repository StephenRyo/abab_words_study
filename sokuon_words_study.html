// Highlight the っ in the word display
function markSokuon(text) {
  return text.replace(/っ/g, '<span class="sokuon-mark">っ</span>');
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function highlightWordInExample(ej, word) {
  if (!word || !ej) return ej;
  let clean = word.replace(/[\(（][^)）]*[\)）]/g, '').replace(/[（）\(\)と]/g,'').trim();
  const stems = new Set([clean]);
  if (clean.length >= 3) stems.add(clean.slice(0, -1));
  if (clean.length >= 4) stems.add(clean.slice(0, -2));
  const sorted = [...stems].sort((a,b) => b.length - a.length);
  let result = ej;
  for (const stem of sorted) {
    if (!stem || stem.length < 2) continue;
    const esc = stem.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re = new RegExp(`(${esc}[ぁ-ん]*)`, 'g');
    const replaced = result.replace(re, '<span class="word-hl">$1</span>');
    if (replaced !== result) { result = replaced; break; }
  }
  return result;
}

    if (currentFilter === 'mastered' && st !== 'mastered') return;
    if (currentFilter === 'unmarked' && st !== 'none')     return;

    const hay = (w.word + w.read + w.mean + w.ej + w.ec).toLowerCase();
    if (q && !hay.includes(q)) return;

    visible++;
    const masterCls = st === 'mastered' ? ' mastered' : '';
    const markCls   = st === 'marked'   ? ' marked'   : '';
    const cnCls     = cn ? ' show-cn' : '';
    const mBtnCls   = st === 'mastered' ? ' on-master' : '';
    const mkBtnCls  = st === 'marked'   ? ' on-mark'   : '';

    const wordDisplay = markSokuon(highlight(w.word, q));
    const mnH  = highlight(w.mean, q);
    const ejRed = highlightWordInExample(w.ej, w.word);
    const ejH  = highlight(ejRed, q);

    const srcCls = w.src === 'N1-1170' ? 'src-1170' : 'src-2600';

    html += `<div class="card${masterCls}${markCls}${cnCls}">
  <div class="card-head">
    <div>
      <div class="word-jp">${wordDisplay}</div>
      <div class="reading">${w.read !== w.word ? w.read : ''}</div>
    </div>
    <div class="badges">
      <span class="badge-type">${w.type}</span>
      <span class="badge-src ${srcCls}">${w.src}</span>
    </div>
  </div>
  <div class="card-body">
    <div class="meaning">${mnH}</div>
    <div class="example-jp">${ejH}</div>
    <div class="example-cn">${w.ec}</div>
  </div>
  <div class="card-foot">
    <button class="btn-sm${mBtnCls}"  onclick="toggleMaster(${i},event)">${st==='mastered'?'✓ 已掌握':'○ 掌握'}</button>
    <button class="btn-sm${mkBtnCls}" onclick="toggleMark(${i},event)">${st==='marked'?'△ 标记中':'△ 要复习'}</button>
    <button class="btn-sm btn-cn"     onclick="toggleCn(${i},event)">${cn?'隐藏译文':'译文'}</button>
  </div>
</div>`;
  });

  if (!visible) html = '<div class="empty">没有符合条件的词语</div>';
  grid.innerHTML = html;
  document.getElementById('countBadge').textContent = visible + ' 語';
  updateProgress();
}

function toggleMaster(i,e) { e.stopPropagation(); states[i]=(states[i]==='mastered')?'none':'mastered'; save(); renderCards(); }
function toggleMark(i,e)   { e.stopPropagation(); states[i]=(states[i]==='marked')?'none':'marked';     save(); renderCards(); }
function toggleCn(i,e)     { e.stopPropagation(); showCn[i]=!showCn[i]; save(); renderCards(); }

function updateProgress() {
  const mastered = Object.values(states).filter(v=>v==='mastered').length;
  const pct = Math.round(mastered/TOTAL*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `已掌握：${mastered} / ${TOTAL}（${pct}%）`;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderCards();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  renderCards();
});

renderCards();
</script>
</body>
</html>
