<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年7月 N1词汇考点押题</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');

  :root {
    --ink:     #1a1a2e;
    --muted:   #5a5a7a;
    --dim:     #9090aa;
    --paper:   #f7f5f0;
    --cream:   #ede9e0;
    --accent:  #c0392b;
    --accent2: #2980b9;
    --rule:    #d4cfc4;
    --card-bg: #ffffff;
    --shadow:  0 2px 12px rgba(26,26,46,0.07);

    --cat1: #c0392b;
    --cat2: #2471a3;
    --cat3: #1e8449;
    --cat4: #7d3c98;
    --cat5: #ca6f1e;
    --cat6: #17a589;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--ink);
    color: #fff;
    padding: 28px 40px 22px;
    border-bottom: 3px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 200;
  }
  .header-inner {
    max-width: 1080px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .site-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .site-sub {
    font-size: 0.78rem;
    color: #aab;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }
  .count-badge {
    margin-left: auto;
    background: var(--accent);
    color: #fff;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
    white-space: nowrap;
  }

  /* ── Controls ── */
  .controls {
    max-width: 1080px;
    margin: 20px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--rule);
    background: var(--card-bg);
    color: var(--muted);
    cursor: pointer;
    font-size: 0.78rem;
    font-family: inherit;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .cat-btn { border-radius: 14px; }
  .cat-btn[data-cat="名詞"].active     { background: var(--cat1); border-color: var(--cat1); }
  .cat-btn[data-cat="動詞"].active     { background: var(--cat2); border-color: var(--cat2); }
  .cat-btn[data-cat="形容詞"].active   { background: var(--cat3); border-color: var(--cat3); }
  .cat-btn[data-cat="副詞"].active     { background: var(--cat4); border-color: var(--cat4); }
  .cat-btn[data-cat="外来語"].active   { background: var(--cat5); border-color: var(--cat5); }
  .cat-btn[data-cat="接続詞"].active   { background: var(--cat6); border-color: var(--cat6); }

  .sep { width: 1px; height: 24px; background: var(--rule); flex-shrink: 0; }

  .search-wrap { margin-left: auto; position: relative; }
  #search {
    padding: 7px 14px 7px 34px;
    border-radius: 20px;
    border: 1.5px solid var(--rule);
    background: var(--card-bg);
    font-family: inherit;
    font-size: 0.82rem;
    color: var(--ink);
    outline: none;
    width: 210px;
    transition: border-color 0.18s;
  }
  #search:focus { border-color: var(--accent2); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--dim); font-size: 12px; pointer-events: none; }

  /* ── Progress ── */
  .progress-wrap { max-width: 1080px; margin: 16px auto 0; padding: 0 20px; }
  .progress-label { font-size: 0.76rem; color: var(--dim); margin-bottom: 5px; letter-spacing: 0.06em; }
  .progress-track { height: 4px; background: var(--cream); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; width: 0%; }

  /* ── Grid ── */
  .grid {
    max-width: 1080px;
    margin: 24px auto 60px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border-radius: 10px;
    box-shadow: var(--shadow);
    border: 1.5px solid var(--rule);
    overflow: hidden;
    transition: transform 0.18s, box-shadow 0.18s;
    position: relative;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(26,26,46,0.11); }
  .card.mastered { border-color: #27ae60; background: #f0faf4; }
  .card.marked   { border-color: #f39c12; background: #fffdf0; }

  /* category left-border accent */
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 10px 0 0 10px;
  }
  .card[data-cat="名詞"]::before   { background: var(--cat1); }
  .card[data-cat="動詞"]::before   { background: var(--cat2); }
  .card[data-cat="形容詞"]::before { background: var(--cat3); }
  .card[data-cat="副詞"]::before   { background: var(--cat4); }
  .card[data-cat="外来語"]::before { background: var(--cat5); }
  .card[data-cat="接続詞"]::before { background: var(--cat6); }

  .card-head {
    padding: 14px 16px 10px 20px;
    border-bottom: 1px solid var(--cream);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .word-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.04em;
    line-height: 1.2;
  }
  .reading { font-size: 0.75rem; color: var(--dim); margin-top: 3px; }
  .num { font-size: 0.65rem; color: var(--dim); margin-top: 2px; }

  .badges { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .badge-type {
    font-size: 0.68rem; padding: 2px 8px; border-radius: 10px;
    color: #fff; letter-spacing: 0.04em; white-space: nowrap;
  }
  .badge-名詞   { background: var(--cat1); }
  .badge-動詞   { background: var(--cat2); }
  .badge-形容詞 { background: var(--cat3); }
  .badge-副詞   { background: var(--cat4); }
  .badge-外来語 { background: var(--cat5); }
  .badge-接続詞 { background: var(--cat6); }

  .badge-subtype {
    font-size: 0.65rem; padding: 2px 7px; border-radius: 10px;
    background: var(--cream); color: var(--muted); white-space: nowrap;
  }

  .card-body { padding: 10px 16px 12px 20px; }
  .meaning { font-size: 0.98rem; font-weight: 500; color: var(--accent); margin-bottom: 8px; line-height: 1.4; }
  .example-jp { font-size: 0.82rem; color: var(--ink); line-height: 1.7; margin-bottom: 3px; }
  .example-cn { font-size: 0.78rem; color: var(--muted); line-height: 1.65; display: none; }
  .card.show-cn .example-cn { display: block; }

  .card-foot {
    padding: 7px 16px 9px 20px;
    border-top: 1px solid var(--cream);
    display: flex;
    gap: 6px;
  }
  .btn-sm {
    padding: 3px 10px; border-radius: 12px; border: 1.2px solid var(--rule);
    background: transparent; font-size: 0.7rem; color: var(--muted);
    cursor: pointer; font-family: inherit; transition: all 0.15s; letter-spacing: 0.03em;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.on-master { border-color: #27ae60; color: #27ae60; background: #f0faf4; }
  .btn-sm.on-mark   { border-color: #f39c12; color: #f39c12; background: #fffdf0; }
  .btn-cn { margin-left: auto; }

  mark { background: #fff3a0; color: inherit; border-radius: 2px; }
  .word-hl { color: var(--accent); font-weight: 700; }

  .empty { grid-column: 1/-1; text-align: center; color: var(--dim); padding: 60px 20px; font-size: 0.9rem; }

  footer { text-align: center; padding: 22px; color: var(--dim); font-size: 0.76rem; border-top: 1px solid var(--rule); letter-spacing: 0.05em; }

  /* category legend */
  .legend {
    max-width: 1080px;
    margin: 10px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.74rem; color: var(--muted);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>

  {no:110,cat:"形容詞",sub:"形動",  word:"穏やか",  read:"おだやか",     mean:"平稳，温和",       ej:"今日の海は非常に穏やかで、船の運行に何の支障もない。",             ec:"今天的海面非常平稳，对船只的航行没有任何妨碍障碍。"},

  {no:150,cat:"副詞", sub:"",       word:"くれぐれも",read:"",           mean:"千万，万分",       ej:"インフルエンザが流行しているので、くれぐれもご自愛ください。",     ec:"流感盛行，请千万保重身体。"},

const TOTAL = WORDS.length;

try { showCn = JSON.parse(localStorage.getItem('n1july_cn')     || '{}'); } catch(e){}

function save() {
  try {
    localStorage.setItem('n1july_states', JSON.stringify(states));
    localStorage.setItem('n1july_cn',     JSON.stringify(showCn));
  } catch(e){}
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function highlightWordInExample(ej, word) {
  if (!word || !ej) return ej;
  // Clean the word: strip trailing conjugation markers and parentheticals
  // e.g. "掲げる"→"掲げ", "潤う"→"潤", "健やか"→"健やか", "着々と"→"着々"
  let clean = word.replace(/[\(（][^)）]*[\)）]/g, '').trim();

  // Build list of stems to try, from longest to shortest
  const stems = new Set();
  stems.add(clean); // full form first

  // Strip common verb/adj endings to get stem
  const stripEndings = [
    /[うくぐすつぬぶむるいい]$/,   // plain form verb/i-adj ending
    /[える][る]?$/,               // ichidan
    /[ある]$/,
    /[いう]$/,
    /[る]$/,
  ];
  let s = clean;
  for (const re of stripEndings) {
    const t = s.replace(re, '');
    if (t.length >= 1 && t !== s) { stems.add(t); break; }
  }

  // Also try removing the last 1 char if word is long enough
  if (clean.length >= 3) stems.add(clean.slice(0, -1));
  if (clean.length >= 4) stems.add(clean.slice(0, -2));

  // Sort stems longest first so we match the most specific
  const sortedStems = [...stems].sort((a, b) => b.length - a.length);

  let result = ej;
  for (const stem of sortedStems) {
    if (!stem || stem.length < 1) continue;
    const escaped = stem.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    // Match the stem followed by any hiragana continuation (conjugation)
    const re = new RegExp(`(${escaped}[ぁ-ん]*)`, 'g');
    const replaced = result.replace(re, '<span class="word-hl">$1</span>');
    if (replaced !== result) { result = replaced; break; }
  }
  return result;
}

function renderCards() {
  const grid = document.getElementById('grid');
  const q = searchQ.trim().toLowerCase();
  let visible = 0;
  let html = '';

  WORDS.forEach((w, i) => {
    const st = states[i] || 'none';
    const cn = showCn[i] || false;

    if (currentFilter === 'marked'   && st !== 'marked')   return;
    if (currentFilter === 'mastered' && st !== 'mastered') return;
    if (currentFilter === 'unmarked' && st !== 'none')     return;
    if (currentCat && w.cat !== currentCat) return;

    const hay = (w.word + w.read + w.mean + w.ej + w.ec).toLowerCase();
    if (q && !hay.includes(q)) return;

    visible++;
    const masterCls  = st === 'mastered' ? ' mastered' : '';
    const markCls    = st === 'marked'   ? ' marked'   : '';
    const cnCls      = cn ? ' show-cn' : '';
    const mBtnCls    = st === 'mastered' ? ' on-master' : '';
    const mkBtnCls   = st === 'marked'   ? ' on-mark'   : '';

    const wH  = highlight(w.word, q);
    const mnH = highlight(w.mean, q);
    const ejRed = highlightWordInExample(w.ej, w.word);
    const ejH = highlight(ejRed, q);

    const readLine = w.read && w.read !== w.word
      ? `<div class="reading">${w.read}</div>` : '';
    const subBadge = w.sub
      ? `<span class="badge-subtype">${w.sub}</span>` : '';

    html += `<div class="card${masterCls}${markCls}${cnCls}" data-cat="${w.cat}" data-idx="${i}">
  <div class="card-head">
    <div>
      <div class="num">${w.no}</div>
      <div class="word-jp">${wH}</div>
      ${readLine}
    </div>
    <div class="badges">
      <span class="badge-type badge-${w.cat}">${w.cat}</span>
      ${subBadge}
    </div>
  </div>
  <div class="card-body">
    <div class="meaning">${mnH}</div>
    <div class="example-jp">${ejH}</div>
    <div class="example-cn">${w.ec}</div>
  </div>
  <div class="card-foot">
    <button class="btn-sm btn-master${mBtnCls}" onclick="toggleMaster(${i},event)">${st==='mastered'?'✓ 已掌握':'○ 掌握'}</button>
    <button class="btn-sm btn-mark${mkBtnCls}"  onclick="toggleMark(${i},event)">${st==='marked'?'△ 标记中':'△ 要复习'}</button>
    <button class="btn-sm btn-cn" onclick="toggleCn(${i},event)">${cn?'隐藏译文':'译文'}</button>
  </div>
</div>`;
  });

  if (!visible) html = '<div class="empty">没有符合条件的词语</div>';
  grid.innerHTML = html;
  document.getElementById('countBadge').textContent = visible + ' 語';
  updateProgress();
}

function toggleMaster(i, e) { e.stopPropagation(); states[i] = (states[i]==='mastered')?'none':'mastered'; save(); renderCards(); }
function toggleMark(i, e)   { e.stopPropagation(); states[i] = (states[i]==='marked')?'none':'marked';     save(); renderCards(); }
function toggleCn(i, e)     { e.stopPropagation(); showCn[i] = !showCn[i];                                  save(); renderCards(); }

function updateProgress() {
  const mastered = Object.values(states).filter(v => v === 'mastered').length;
  const pct = Math.round(mastered / TOTAL * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `已掌握：${mastered} / ${TOTAL}（${pct}%）`;
}

// State/category filters
document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderCards();
  });
});

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const same = btn.classList.contains('active');
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    if (!same) { btn.classList.add('active'); currentCat = btn.dataset.cat; }
    else currentCat = '';
    renderCards();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value;
  renderCards();
});

renderCards();
